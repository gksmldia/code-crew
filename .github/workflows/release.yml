name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - name: create release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = process.env.GITHUB_REF_NAME;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `code-crew ${tag}`,
              body: 'See the assets to download this version and install.',
              draft: true,
              prerelease: false,
              target_commitish: context.sha,
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Install npm deps
        run: npm ci
      - name: Stub hook binary path (satisfies tauri-build resource check)
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          ext=""
          [[ "${{ matrix.platform }}" == "windows-latest" ]] && ext=".exe"
          touch src-tauri/binaries/code-crew-hook${ext}
      - name: Build hook binary (macOS — universal)
        if: matrix.platform == 'macos-latest'
        working-directory: ./src-tauri
        run: |
          cargo build --bin code-crew-hook --release --target aarch64-apple-darwin
          cargo build --bin code-crew-hook --release --target x86_64-apple-darwin
          mkdir -p target/universal-apple-darwin/release
          lipo -create -output target/universal-apple-darwin/release/code-crew-hook \
            target/aarch64-apple-darwin/release/code-crew-hook \
            target/x86_64-apple-darwin/release/code-crew-hook
          cp target/universal-apple-darwin/release/code-crew-hook binaries/code-crew-hook
      - name: Build hook binary (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: ./src-tauri
        shell: bash
        run: |
          cargo build --bin code-crew-hook --release
          cp target/release/code-crew-hook.exe binaries/code-crew-hook.exe
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    runs-on: ubuntu-latest
    needs: [create-release, build]
    steps:
      - name: publish release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
              prerelease: false,
            });
