name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Install dependencies (Linux only — n/a here)
        if: matrix.platform == 'ubuntu-latest'
        run: echo "skip"
      - name: Install npm deps
        run: npm ci
      - name: Stub hook binary path (satisfies tauri-build resource check)
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          ext=""
          [[ "${{ matrix.platform }}" == "windows-latest" ]] && ext=".exe"
          touch src-tauri/binaries/code-crew-hook${ext}
      - name: Build hook binary (macOS — universal)
        if: matrix.platform == 'macos-latest'
        working-directory: ./src-tauri
        run: |
          cargo build --bin code-crew-hook --release --target aarch64-apple-darwin
          cargo build --bin code-crew-hook --release --target x86_64-apple-darwin
          mkdir -p target/universal-apple-darwin/release
          lipo -create -output target/universal-apple-darwin/release/code-crew-hook \
            target/aarch64-apple-darwin/release/code-crew-hook \
            target/x86_64-apple-darwin/release/code-crew-hook
          cp target/universal-apple-darwin/release/code-crew-hook binaries/code-crew-hook
      - name: Build hook binary (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: ./src-tauri
        shell: bash
        run: |
          cargo build --bin code-crew-hook --release
          cp target/release/code-crew-hook.exe binaries/code-crew-hook.exe
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "code-crew ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
